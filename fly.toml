# fly.toml app configuration file generated for ai-coworker-for-businesses on 2026-04-28T17:41:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ai-coworker-for-businesses'
primary_region = 'ams'

[build]

[[mounts]]
  source = 'ai_coworker_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
